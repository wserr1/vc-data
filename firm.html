<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VC Data — Firm Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #f0ede8;
    --muted: #666660;
    --accent: #c8f542;
    --accent2: #e8ff80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,245,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,245,66,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--text);
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  .nav-links { display: flex; gap: 32px; list-style: none; }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text); }

  .main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 120px 48px 80px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    margin-bottom: 40px;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--accent); }

  .firm-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 40px;
    margin-bottom: 48px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: flex-end;
    gap: 40px;
  }

  .firm-tag {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .firm-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 4vw, 48px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .firm-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .aum-display { text-align: right; }

  .aum-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .aum-value {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--accent);
  }

  .aum-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 40px 0 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .card-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    gap: 16px;
  }

  .data-row:last-child { border-bottom: none; }

  .data-label { color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  .data-value {
    color: var(--text);
    text-align: right;
    word-break: break-word;
  }

  .data-value.accent { color: var(--accent); }

  .data-value.large {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
  }

  .badge-verified {
    background: rgba(200,245,66,0.1);
    color: var(--accent);
    border: 1px solid rgba(200,245,66,0.2);
  }

  .badge-exempt {
    background: rgba(102,102,96,0.15);
    color: var(--muted);
    border: 1px solid rgba(102,102,96,0.3);
  }

  .badge-yes {
    background: rgba(200,245,66,0.1);
    color: var(--accent);
    border: 1px solid rgba(200,245,66,0.2);
  }

  .badge-no {
    background: rgba(102,102,96,0.1);
    color: var(--muted);
    border: 1px solid rgba(102,102,96,0.2);
  }

  .source-tag {
    font-size: 10px;
    color: var(--muted);
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .source-tag span { color: var(--accent); opacity: 0.7; }

  .loading {
    text-align: center;
    padding: 120px;
    color: var(--muted);
    font-size: 12px;
  }

  .loading::after {
    content: '';
    display: block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 16px auto 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">VC<span>.</span>Data</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="database.html">Database</a></li>
    <li><a href="#">Match</a></li>
    <li><a href="#">About</a></li>
  </ul>
</nav>

<div class="main" id="content">
  <div class="loading">Loading firm data</div>
</div>

<script>
  function fmt(n) {
    if (!n) return "—";
    if (n >= 1e9) return `$${(n/1e9).toFixed(1)}B`;
    if (n >= 1e6) return `$${(n/1e6).toFixed(0)}M`;
    return `$${n.toLocaleString()}`;
  }

  function fmtPhone(p) {
    if (!p) return "—";
    const c = p.replace(/\D/g,'');
    if (c.length === 10) return `(${c.slice(0,3)}) ${c.slice(3,6)}-${c.slice(6)}`;
    return p;
  }

  function v(val, fallback="—") {
    return (val !== undefined && val !== null && val !== "" && val !== 0) ? val : fallback;
  }

  function pct(val) {
    if (!val) return "—";
    return `${val}%`;
  }

  async function loadFirm() {
    const params = new URLSearchParams(window.location.search);
    const firmName = params.get("firm");
    if (!firmName) {
      document.getElementById("content").innerHTML = '<p style="color:var(--muted);padding:80px 0">No firm specified.</p>';
      return;
    }

    const res = await fetch(`/.netlify/functions/airtable`);
    const firms = await res.json();
    const firm = firms.find(f => f.Firm === decodeURIComponent(firmName));

    if (!firm) {
      document.getElementById("content").innerHTML = '<p style="color:var(--muted);padding:80px 0">Firm not found.</p>';
      return;
    }

    const isExempt = firm.Notes === "Exempt Reporting Adviser";
    document.title = `VC Data — ${firm.Firm}`;

    document.getElementById("content").innerHTML = `
      <a href="database.html" class="back-link">← Back to Database</a>

      <div class="firm-header">
        <div>
          <div class="firm-tag">${isExempt ? "Exempt Reporting Adviser" : "SEC Full Registrant · Form ADV"}</div>
          <h1 class="firm-name">${firm.Firm}</h1>
          <div class="firm-meta">
            <span>📍 ${v(firm.City)}, ${v(firm.State)}</span>
            ${firm.Phone ? `<span>📞 ${fmtPhone(firm.Phone)}</span>` : ""}
            ${firm["Last Filed"] ? `<span>🗓 Filed ${firm["Last Filed"]}</span>` : ""}
            ${firm["Business Hours"] ? `<span>🕐 ${firm["Business Hours"]}</span>` : ""}
          </div>
        </div>
        <div class="aum-display">
          <div class="aum-label">Assets Under Management</div>
          <div class="aum-value">${fmt(firm.AUM)}</div>
          <div class="aum-sub">${firm.AUM ? "SEC Verified · Form ADV" : "Not required to disclose"}</div>
        </div>
      </div>

      <div class="grid-3">
        <div class="stat-card">
          <div class="stat-value">${v(firm.Employees)}</div>
          <div class="stat-label">Total Employees</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${v(firm["Advisory Employees"])}</div>
          <div class="stat-label">Investment Staff</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${v(firm.Clients)}</div>
          <div class="stat-label">Active Clients</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${fmt(firm["Discretionary AUM"])}</div>
          <div class="stat-label">Discretionary AUM</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${fmt(firm["Non-US AUM"])}</div>
          <div class="stat-label">Non-US AUM</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${v(firm["Num Custodians"])}</div>
          <div class="stat-label">Custodians</div>
        </div>
      </div>

      <div class="section-label">Firm Information</div>
      <div class="grid-2">
        <div class="card">
          <div class="card-title">Registration & Identity</div>
          <div class="data-row"><span class="data-label">Legal Name</span><span class="data-value">${firm.Firm}</span></div>
          <div class="data-row"><span class="data-label">CRD Number</span><span class="data-value accent">${v(firm.CRD)}</span></div>
          <div class="data-row"><span class="data-label">Registration Type</span><span class="data-value">${isExempt ? '<span class="badge badge-exempt">Exempt Adviser</span>' : '<span class="badge badge-verified">Full Registrant</span>'}</span></div>
          <div class="data-row"><span class="data-label">Private Fund Adviser</span><span class="data-value">${firm["Private Fund Advisor"] === "Yes" ? '<span class="badge badge-yes">Yes</span>' : '<span class="badge badge-no">No</span>'}</span></div>
          <div class="data-row"><span class="data-label">Last Filed</span><span class="data-value">${v(firm["Last Filed"])}</span></div>
          ${firm.Signatory ? `<div class="data-row"><span class="data-label">Signatory</span><span class="data-value">${firm.Signatory}</span></div>` : ""}
          ${firm["Signatory Title"] ? `<div class="data-row"><span class="data-label">Title</span><span class="data-value">${firm["Signatory Title"]}</span></div>` : ""}
        </div>

        <div class="card">
          <div class="card-title">Contact & Location</div>
          <div class="data-row"><span class="data-label">Address</span><span class="data-value">${v(firm.Address)}</span></div>
          <div class="data-row"><span class="data-label">City</span><span class="data-value">${v(firm.City)}</span></div>
          <div class="data-row"><span class="data-label">State</span><span class="data-value">${v(firm.State)}</span></div>
          <div class="data-row"><span class="data-label">Phone</span><span class="data-value">${fmtPhone(firm.Phone)}</span></div>
          ${firm.Fax ? `<div class="data-row"><span class="data-label">Fax</span><span class="data-value">${firm.Fax}</span></div>` : ""}
          ${firm["Business Hours"] ? `<div class="data-row"><span class="data-label">Business Hours</span><span class="data-value">${firm["Business Hours"]}</span></div>` : ""}
        </div>
      </div>

      <div class="section-label">Assets Under Management</div>
      <div class="grid-2">
        <div class="card">
          <div class="card-title">AUM Breakdown</div>
          <div class="data-row"><span class="data-label">Total AUM</span><span class="data-value large">${fmt(firm.AUM)}</span></div>
          <div class="data-row"><span class="data-label">Discretionary AUM</span><span class="data-value accent">${fmt(firm["Discretionary AUM"])}</span></div>
          <div class="data-row"><span class="data-label">Non-Discretionary AUM</span><span class="data-value">${fmt(firm["Non Discretionary AUM"])}</span></div>
          <div class="data-row"><span class="data-label">Non-US AUM</span><span class="data-value">${fmt(firm["Non-US AUM"])}</span></div>
          <div class="data-row"><span class="data-label">Number of Accounts</span><span class="data-value">${v(firm["Num Accounts"])}</span></div>
        </div>

        <div class="card">
          <div class="card-title">Client Profile</div>
          <div class="data-row"><span class="data-label">Total Clients</span><span class="data-value accent">${v(firm.Clients)}</span></div>
          <div class="data-row"><span class="data-label">Non-US Clients</span><span class="data-value">${pct(firm["Pct Non-US Clients"])}</span></div>
          <div class="data-row"><span class="data-label">Compensation Structure</span><span class="data-value">${v(firm.Compensation)}</span></div>
          <div class="data-row"><span class="data-label">Number of Custodians</span><span class="data-value">${v(firm["Num Custodians"])}</span></div>
        </div>
      </div>

      <div class="section-label">People & Operations</div>
      <div class="grid-2">
        <div class="card">
          <div class="card-title">Employees</div>
          <div class="data-row"><span class="data-label">Total Employees</span><span class="data-value accent">${v(firm.Employees)}</span></div>
          <div class="data-row"><span class="data-label">Investment Staff</span><span class="data-value">${v(firm["Advisory Employees"])}</span></div>
        </div>
        <div class="card">
          <div class="card-title">Key Contacts</div>
          ${firm.Signatory ? `<div class="data-row"><span class="data-label">Signatory</span><span class="data-value">${firm.Signatory}</span></div>` : ""}
          ${firm["Signatory Title"] ? `<div class="data-row"><span class="data-label">Title</span><span class="data-value">${firm["Signatory Title"]}</span></div>` : ""}
          ${!firm.Signatory && !firm["Signatory Title"] ? `<div class="data-row"><span class="data-label">Contact data</span><span class="data-value">Not available</span></div>` : ""}
        </div>
      </div>

      <div class="source-tag">
        All data sourced from <span>SEC Form ADV — IA_ADV_Base_A dataset</span>.
        Figures reflect the most recent filing as of ${v(firm["Last Filed"])}.
        CRD: ${v(firm.CRD)}
      </div>
    `;
  }

  loadFirm();
</script>
</body>
</html>
